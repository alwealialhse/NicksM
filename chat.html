<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Chat - لوحة الإيموجي الكاملة</title>
    <style>
        body { background-color: #0d1117; color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        #chat-screen {
            flex: 1; overflow-y: auto; padding: 20px;
            background-image: linear-gradient(rgba(13, 17, 23, 0.85), rgba(13, 17, 23, 0.85)), 
                              url('https://images.alphacoders.com/605/605592.jpg');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; gap: 12px;
        }

        .message { max-width: 80%; padding: 10px 15px; border-radius: 18px; font-size: 14px; line-height: 1.4; animation: fadeIn 0.3s; }
        .my-message { align-self: flex-start; background: #238636; border-bottom-right-radius: 2px; }
        .other-message { align-self: flex-end; background: #21262d; border-bottom-left-radius: 2px; border: 1px solid #30363d; }
        .msg-user { font-size: 10px; color: #58a6ff; font-weight: bold; margin-bottom: 4px; display: block; }
        .chat-img { max-width: 100%; border-radius: 10px; margin-top: 5px; }

        /* منطقة الإدخال */
        .chat-input-area { background: #161b22; padding: 10px; border-top: 1px solid #30363d; position: relative; }
        .input-row { display: flex; gap: 8px; align-items: center; }
        .chat-input { flex: 1; background: #0d1117; border: 1px solid #30363d; color: white; padding: 12px; border-radius: 25px; outline: none; }
        
        /* تصميم لوحة الإيموجي العملاقة */
        .emoji-container { 
            display: none; background: #1c2128; border: 1px solid #30363d; 
            border-radius: 15px; position: absolute; bottom: 70px; right: 10px; left: 10px;
            height: 250px; overflow-y: auto; z-index: 1000; padding: 10px;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
        }
        .emoji-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 10px; }
        .emoji-item { font-size: 24px; cursor: pointer; text-align: center; transition: 0.2s; }
        .emoji-item:hover { transform: scale(1.3); }
        .emoji-category-title { font-size: 12px; color: #8b949e; margin: 10px 0 5px; grid-column: span 8; border-bottom: 1px solid #30363d; }

        .icon-btn { background: none; border: none; font-size: 22px; cursor: pointer; color: #8b949e; }
        .send-btn { background: #58a6ff; border: none; color: white; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-weight: bold; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header style="background:#161b22; padding:15px; text-align:center; border-bottom:1px solid #30363d;">
        <b>Nexus Chat 🔥</b>
    </header>

    <div id="chat-screen"></div>

    <div id="emoji-panel" class="emoji-container">
        <div class="emoji-grid" id="emoji-list">
            </div>
    </div>

    <div class="chat-input-area">
        <div id="preview-box" style="display:none; padding:5px;"><img id="p-img" style="height:60px; border-radius:8px;"></div>
        <div class="input-row">
            <button class="icon-btn" onclick="toggleEmojiPanel()">😀</button>
            <label class="icon-btn">🖼️ <input type="file" id="f-input" style="display:none" onchange="handleFile(event)"></label>
            <input type="text" id="msg-input" class="chat-input" placeholder="اكتب رسالتك...">
            <button class="send-btn" onclick="sendMessage()">إرسال</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

    <script>
        // إعدادات Firebase الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyBn5lhXP6mK7wCTixhSEqEeC9BDG-8McY",
            authDomain: "nicksm-c6c71.firebaseapp.com",
            projectId: "nicksm-c6c71",
            storageBucket: "nicksm-c6c71.firebasestorage.app",
            messagingSenderId: "512971642548",
            appId: "1:512971642548:web:ad8c925cc6f5d20e6f29e1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const myName = localStorage.getItem('nexus_username') || "عضو مجهول";
        let uploadedImg = null;

        // --- توليد الإيموجيات الشاملة ---
        const emojiCategories = {
            "وجوه": ["😀","😃","😄","😁","😆","😅","😂","🤣","😊","😇","🙂","🙃","😉","😌","😍","🥰","😘","😗","😙","😚","😋","😛","😝","😜","🤪","🤨","🧐","🤓","😎","🤩","🥳","😏","😒","😞","😔","😟","😕","🙁","☹️","😣","😖","😫","😩","🥺","😢","😭","😤","😠","😡","🤬","🤯","😳","🥵","🥶","😱","😨","😰","😥","😓","🤗","🤔","🤭","🤫","🤥","😶","😐","😑","😬","🙄","😯","😦","😧","😮","😲","🥱","😴","🤤","😪","😵","🤐","🥴","🤢","🤮","🤧","😷","🤒","🤕"],
            "أيدي وقلوب": ["❤️","🧡","💛","💚","💙","💜","🖤","🤍","🤎","💔","❣️","💕","💞","💓","💗","💖","💘","💝","💟","👋","🤚","🖐️","✋","🖖","👌","🤏","✌️","🤞","🤟","🤘","🤙","👈","👉","👆","🖕","👇","☝️","👍","👎","✊","👊","🤛","🤜","👏","🙌","👐","🤲","🤝","🙏"],
            "أنمي وحيوانات": ["🐱","👤","👽","🤖","🎃","😺","😸","😹","😻","😼","😽","🙀","😿","😾","🐶","🐱","🐭","🐹","🐰","🦊","🐻","🐼","🐨","🐯","🦁","🐮","🐷","🐸","🐒","🐣","🦆","🦇","🐉","🐲"]
        };

        const emojiList = document.getElementById('emoji-list');
        for (const [cat, emojis] of Object.entries(emojiCategories)) {
            const title = document.createElement('div');
            title.className = 'emoji-category-title';
            title.innerText = cat;
            emojiList.appendChild(title);
            emojis.forEach(e => {
                const span = document.createElement('span');
                span.className = 'emoji-item';
                span.innerText = e;
                span.onclick = () => { document.getElementById('msg-input').value += e; };
                emojiList.appendChild(span);
            });
        }

        function toggleEmojiPanel() {
            const panel = document.getElementById('emoji-panel');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        }

        function handleFile(e) {
            const reader = new FileReader();
            reader.onload = (event) => {
                uploadedImg = event.target.result;
                document.getElementById('preview-box').style.display = 'block';
                document.getElementById('p-img').src = uploadedImg;
            };
            reader.readAsDataURL(e.target.files[0]);
        }

        async function sendMessage() {
            const input = document.getElementById('msg-input');
            if (!input.value.trim() && !uploadedImg) return;

            await db.collection("chat_messages").add({
                user: myName,
                text: input.value,
                image: uploadedImg,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });

            input.value = "";
            uploadedImg = null;
            document.getElementById('preview-box').style.display = 'none';
            document.getElementById('emoji-panel').style.display = 'none';
        }

        db.collection("chat_messages").orderBy("timestamp", "asc").onSnapshot(snap => {
            const screen = document.getElementById('chat-screen');
            screen.innerHTML = "";
            snap.forEach(doc => {
                const m = doc.data();
                const div = document.createElement('div');
                div.className = `message ${m.user === myName ? 'my-message' : 'other-message'}`;
                div.innerHTML = `<span class="msg-user">${m.user}</span>${m.text}${m.image ? `<br><img src="${m.image}" class="chat-img">` : ''}`;
                screen.appendChild(div);
            });
            screen.scrollTop = screen.scrollHeight;
        });
    </script>
</body>
</html>
