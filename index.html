<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - الترحيب</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #0d1117;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }
        .welcome-card {
            background: #161b22;
            border: 1px solid #30363d;
            padding: 40px 20px;
            border-radius: 25px;
            text-align: center;
            width: 85%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .nexus-logo {
            font-size: 50px;
            font-weight: bold;
            color: #58a6ff;
            text-shadow: 0 0 15px rgba(88, 166, 255, 0.5);
            margin-bottom: 10px;
        }
        .welcome-title { color: white; font-size: 28px; margin-bottom: 20px; }
        .welcome-text { color: #8b949e; line-height: 1.6; margin-bottom: 40px; }
        
        .entry-btn {
            background: #238636;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        .entry-btn:hover { background: #2ea043; transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="welcome-card">
        <div class="nexus-logo">NEXUS</div>
        <h1 class="welcome-title">مرحباً بك يا بطل! 🔥</h1>
        <p class="welcome-text">
            نحن سعداء جداً بوجودك في Nexus. عالم الأنمي، النقاشات الأسطورية، والجواهر بانتظارك.
        </p>

        <button class="entry-btn" onclick="window.location.href='pages/home.html'">
            دخول الى عالم الانمي NicksM 🚀
        </button>

        <p style="color:#58a6ff; margin-top:20px; font-size:12px;">انضم إلى آلاف الأوتاكو العرب</p>
    </div>

</body>
</html>
