<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - قائمة الغرف</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>

    <header class="main-header">
        <div class="logo">NEXUS</div>
        <div class="header-left">
            <button onclick="window.location.href='home.html'" class="exit-btn">الرئيسية</button>
            <div class="profile-trigger" onclick="toggleProfile()">
                <img src="../assets/icons/user-avatar.png" alt="Profile">
            </div>
        </div>
    </header>

    <main class="rooms-lobby">
        <div class="lobby-header">
            <h2>استكشف غرف الدردشة</h2>
            <p>اختر غرفة للانضمام إلى النقاش</p>
        </div>

        <div class="rooms-grid" id="all-rooms-list">
            <div class="room-card">
                <div class="room-icon">💬</div>
                <div class="room-details">
                    <h3>الغرفة العامة</h3>
                    <p>دردشة حرة لجميع الأعضاء</p>
                </div>
                <button onclick="enterRoom('الغرفة العامة')" class="join-room-btn">دخول</button>
            </div>

            <div class="room-card">
                <div class="room-icon">🦊</div>
                <div class="room-details">
                    <h3>عشاق ناروتو</h3>
                    <p>نقاشات حول عالم الشينوبي</p>
                </div>
                <button onclick="enterRoom('عشاق ناروتو')" class="join-room-btn">دخول</button>
            </div>
        </div>

        <div id="owner-action" class="owner-floating-action">
            <button onclick="showCreateRoomModal()" class="create-fab">➕ إنشاء غرفة جديدة</button>
        </div>
    </main>

    <div id="create-room-modal" class="modal-overlay" style="display:none">
        <div class="confirm-box">
            <h3>تأسيس غرفة جديدة</h3>
            <input type="text" id="new-room-name" placeholder="اسم الغرفة..." class="room-input">
            <textarea id="new-room-desc" placeholder="وصف قصير للغرفة..." class="room-input"></textarea>
            <div class="confirm-btns">
                <button onclick="confirmCreateRoom()" class="send-btn">تأكيد</button>
                <button onclick="hideCreateRoomModal()" class="cancel-btn">إلغاء</button>
            </div>
        </div>
    </div>

    <script>
        function enterRoom(name) {
            // حفظ اسم الغرفة المختارة للدخول إليها
            localStorage.setItem('targetRoom', name);
            window.location.href = 'chat.html';
        }

        function showCreateRoomModal() {
            document.getElementById('create-room-modal').style.display = 'flex';
        }

        function hideCreateRoomModal() {
            document.getElementById('create-room-modal').style.display = 'none';
        }

        function confirmCreateRoom() {
            let name = document.getElementById('new-room-name').value;
            let desc = document.getElementById('new-room-desc').value;
            if(name.trim() === "") return alert("اكتب اسم الغرفة!");

            let list = document.getElementById('all-rooms-list');
            let card = document.createElement('div');
            card.className = 'room-card';
            card.innerHTML = `
                <div class="room-icon">🔥</div>
                <div class="room-details">
                    <h3>${name}</h3>
                    <p>${desc || 'غرفة جديدة بواسطة المالك'}</p>
                </div>
                <button onclick="enterRoom('${name}')" class="join-room-btn">دخول</button>
            `;
            list.appendChild(card);
            hideCreateRoomModal();
        }
    </script>

    <style>
        .rooms-lobby { padding: 20px; max-width: 800px; margin: 0 auto; }
        .lobby-header { text-align: center; margin-bottom: 30px; }
        .lobby-header h2 { color: #58a6ff; font-size: 2rem; }
        
        .rooms-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        
        .room-card { 
            background: #161b22; 
            border: 1px solid #30363d; 
            border-radius: 15px; 
            padding: 15px; 
            display: flex; 
            align-items: center; 
            gap: 15px;
            transition: 0.3s;
        }
        .room-card:hover { border-color: #58a6ff; transform: scale(1.02); }
        
        .room-icon { font-size: 2rem; background: #0b0e14; padding: 10px; border-radius: 12px; }
        .room-details { flex: 1; }
        .room-details h3 { margin: 0; font-size: 1.2rem; color: #f0f6fc; }
        .room-details p { margin: 5px 0 0; color: #8b949e; font-size: 0.9rem; }
        
        .join-room-btn { 
            background: #238636; 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: bold;
        }

        .owner-floating-action { position: fixed; bottom: 30px; left: 30px; }
        .create-fab { 
            background: #58a6ff; 
            color: white; 
            border: none; 
            padding: 15px 25px; 
            border-radius: 50px; 
            font-weight: bold; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            cursor: pointer;
        }
        
        .exit-btn { background: #21262d; color: white; border: 1px solid #30363d; padding: 5px 15px; border-radius: 8px; cursor: pointer; margin-left: 10px; }
    </style>
</body>
</html>
